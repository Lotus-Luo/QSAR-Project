# ==============================================================================
# Conda Environment Configuration for QSAR Modeling Pipeline
# ==============================================================================
# This environment file contains all dependencies required to run qsar_modeling_pytorch.py
# 
# Usage:
#   conda env create -f environment.yml
#   conda activate qsar_modeling
# ==============================================================================

name: qsar_modeling

# ==============================================================================
# Python Version
# ==============================================================================
# Python 3.10-3.12 recommended for compatibility with all packages
python: 3.12

# ==============================================================================
# Core Dependencies
# ==============================================================================
dependencies:
  # Python standard library packages (installed by conda)
  - python>=3.10

# ==============================================================================
# Data Processing and Scientific Computing
# ==============================================================================
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0

# ==============================================================================
# Machine Learning - Scikit-learn
# ==============================================================================
  - scikit-learn>=1.0.0

# ==============================================================================
# Gradient Boosting Frameworks
# ==============================================================================
  - xgboost>=1.5.0
  - lightgbm>=3.3.0

# ==============================================================================
# Deep Learning - PyTorch
# ==============================================================================
  - pytorch>=2.0.0
  - torchvision>=0.15.0

# ==============================================================================
# Deep Learning - PyTorch Geometric (for GAT model)
# ==============================================================================
  - pyg>=2.3.0
  - pytorch-cluster>=1.6.0
  - pytorch-scatter>=2.1.0
  - pytorch-spline-conv>=1.2.0
  - torch-sparse>=0.6.0

# ==============================================================================
# Chemistry - RDKit
# ==============================================================================
  - rdkit>=2022.09.1

# ==============================================================================
# Natural Language Processing - Transformers (for ChemBERTa model)
# ==============================================================================
  - transformers>=4.20.0

# ==============================================================================
# Visualization
# ==============================================================================
  - matplotlib>=3.5.0
  - seaborn>=0.11.0

# ==============================================================================
# Configuration and Utilities
# ==============================================================================
  - pyyaml>=6.0
  - tqdm>=4.62.0
  - joblib>=1.1.0

# ==============================================================================
# Model Interpretability - SHAP
# ==============================================================================
  - shap>=0.41.0

# ==============================================================================
# Additional Utilities
# ==============================================================================
  - pip>=22.0.0

# ==============================================================================
# Pip Packages (if needed for packages not available in conda)
# ==============================================================================
  - pip:
    # Optional: Additional utilities
    - pillow>=9.0.0
    - openpyxl>=3.0.0  # For Excel file support

# ==============================================================================
# Notes
# ==============================================================================
# 1. This environment supports all models available in qsar_modeling_pytorch.py:
#    - Traditional ML: LR, RFC, SVC, XGBC, LGBMC, ETC, Ridge, RFR, ETR
#    - Deep Learning: MLP, GAT, ChemBERTa
#
# 2. GPU Support:
#    - To enable GPU support, install CUDA version of PyTorch:
#      pip install torch torchvision --index-url https://download.pytorch.org/whl/cu118
#
# 3. PyTorch Geometric:
#    - May require specific version matching with PyTorch
#    - Check compatibility at: https://pytorch-geometric.readthedocs.io/
#
# 4. RDKit Installation:
#    - RDKit is available via conda-forge channel
#    - If installation fails, try: conda install -c conda-forge rdkit
#
# 5. Memory Requirements:
#    - For small datasets (<1000 samples): 8GB RAM minimum
#    - For medium datasets (1000-10000 samples): 16GB RAM recommended
#    - For large datasets (>10000 samples): 32GB RAM recommended
#    - GPU memory: 4GB minimum for training deep learning models
#
# 6. Installation Commands:
#    - Create environment: conda env create -f environment.yml
#    - Update environment: conda env update -f environment.yml
#    - Activate environment: conda activate qsar_modeling
#    - Remove environment: conda env remove -n qsar_modeling
#
# 7. Alternative Installation:
#    - If conda installation fails, you can use pip:
#      pip install numpy pandas scikit-learn matplotlib tqdm pyyaml shap joblib torch torchvision rdkit-pypi transformers xgboost lightgbm torch-geometric
#    - Note: rdkit-pypi may have compatibility issues, conda is preferred
#
# ==============================================================================